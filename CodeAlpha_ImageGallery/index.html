<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - CodeAlpha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Gallery</h1>
            <p>Explore our beautiful collection of images</p>
        </header>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="city">City</button>
            <button class="filter-btn" data-filter="abstract">Abstract</button>
        </div>

        <!-- Gallery Grid -->
<div class="gallery-item" data-category="nature">
    <img src="https://picsum.photos/400/300?random=1" alt="Nature 1">
</div>
<div class="gallery-item" data-category="nature">
    <img src="https://picsum.photos/400/300?random=2" alt="Nature 2">
</div>
<div class="gallery-item" data-category="city">
    <img src="https://picsum.photos/400/300?random=3" alt="City 1">
</div>
<div class="gallery-item" data-category="city">
    <img src="https://picsum.photos/400/300?random=4" alt="City 2">
</div>
<div class="gallery-item" data-category="abstract">
    <img src="https://picsum.photos/400/300?random=5" alt="Abstract 1">
</div>
<div class="gallery-item" data-category="abstract">
    <img src="https://picsum.photos/400/300?random=6" alt="Abstract 2">
</div>


    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close">&times;</button>
            <button class="lightbox-prev">&#10094;</button>
            <img id="lightbox-image" src="" alt="Lightbox Image">
            <button class="lightbox-next">&#10095;</button>
            <div class="lightbox-info">
                <p id="lightbox-caption"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
