<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - CodeAlpha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="music-player">
            <!-- Album Art -->
            <div class="album-art">
           <img id="albumArt" src="https://via.placeholder.com/300?text=Now+Playing" alt="Album Art">
                <div class="playing-indicator" id="playingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <h2 id="songTitle">Song Title</h2>
                <p id="artistName">Artist Name</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <span id="currentTime" class="time">0:00</span>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                    <input type="range" id="progressSlider" min="0" max="100" value="0" class="progress-slider">
                </div>
                <span id="duration" class="time">0:00</span>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="repeatBtn" class="control-btn" title="Repeat">
                    <span class="icon">🔁</span>
                </button>
                <button id="prevBtn" class="control-btn" title="Previous">
                    <span class="icon">⏮</span>
                </button>
                <button id="playBtn" class="control-btn play-btn" title="Play/Pause">
                    <span class="icon">▶</span>
                </button>
                <button id="nextBtn" class="control-btn" title="Next">
                    <span class="icon">⏭</span>
                </button>
                <button id="shuffleBtn" class="control-btn" title="Shuffle">
                    <span class="icon">🔀</span>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="volume-container">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider">
                <span id="volumeValue" class="volume-value">70%</span>
            </div>

            <!-- Playlist Toggle -->
            <button id="playlistToggle" class="playlist-toggle">
                <span class="icon">📋</span>
                Playlist
            </button>
        </div>

        <!-- Playlist -->
        <div class="playlist-container" id="playlistContainer">
            <div class="playlist-header">
                <h3>Playlist</h3>
                <button id="closePlaylist" class="close-btn">✕</button>
            </div>
            <div class="playlist" id="playlist">
                <!-- Playlist items will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
